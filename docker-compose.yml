services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: aiwtp
      POSTGRES_PASSWORD: aiwtp-password
      POSTGRES_DB: aiwtp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  control-plane:
    build:
      context: .
      target: app-runtime
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 8080
      CONTROL_PLANE_BIND_HOST: 0.0.0.0
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_RUN_MIGRATIONS: "false"
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
      ARTIFACT_STORAGE_MODE: s3
      ARTIFACT_S3_ENDPOINT: http://minio:9000
      ARTIFACT_S3_PUBLIC_ENDPOINT: http://127.0.0.1:19000
      ARTIFACT_S3_REGION: us-east-1
      ARTIFACT_S3_BUCKET: aiwtp-artifacts
      ARTIFACT_S3_ACCESS_KEY_ID: minioadmin
      ARTIFACT_S3_SECRET_ACCESS_KEY: minioadmin
      ARTIFACT_S3_FORCE_PATH_STYLE: "true"
      ARTIFACT_S3_PREFIX: artifacts
      ARTIFACT_RETENTION_DAYS_DEFAULT: "7"
      ARTIFACT_DOWNLOAD_SIGNED_URL_TTL_SECONDS: "300"
    ports:
      - "18080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  ai-orchestrator:
    build:
      context: .
      target: playwright-app-runtime
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      PORT: ${AI_ORCHESTRATOR_PORT:-8081}
      AI_ORCHESTRATOR_PORT: ${AI_ORCHESTRATOR_PORT:-8081}
      AI_ORCHESTRATOR_BIND_HOST: ${AI_ORCHESTRATOR_BIND_HOST:-0.0.0.0}
      AI_ORCHESTRATOR_STORE_MODE: ${AI_ORCHESTRATOR_STORE_MODE:-postgres}
      AI_ORCHESTRATOR_DATABASE_URL: ${AI_ORCHESTRATOR_DATABASE_URL:-postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp}
      AI_ORCHESTRATOR_RUN_MIGRATIONS: ${AI_ORCHESTRATOR_RUN_MIGRATIONS:-true}
      AI_PROVIDER: ${AI_PROVIDER:-google}
      AI_GOOGLE_MODEL: ${AI_GOOGLE_MODEL:-gemini-2.5-flash}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:-gpt-4.1-mini}
      AI_OPENAI_BASE_URL: ${AI_OPENAI_BASE_URL:-}
      AI_PROVIDER_TEMPERATURE: ${AI_PROVIDER_TEMPERATURE:-0.1}
      AI_MEMORY_MAX_FACTS: ${AI_MEMORY_MAX_FACTS:-32}
      AI_ORCHESTRATOR_PLAYWRIGHT_BROWSER: ${AI_ORCHESTRATOR_PLAYWRIGHT_BROWSER:-chromium}
      AI_ORCHESTRATOR_PLAYWRIGHT_HEADLESS: ${AI_ORCHESTRATOR_PLAYWRIGHT_HEADLESS:-true}
      AI_ORCHESTRATOR_PLAYWRIGHT_OUTPUT_ROOT: ${AI_ORCHESTRATOR_PLAYWRIGHT_OUTPUT_ROOT:-/tmp/aiwtp-ai-orchestrator}
      AI_ORCHESTRATOR_PLAYWRIGHT_EXECUTABLE_PATH: ${AI_ORCHESTRATOR_PLAYWRIGHT_EXECUTABLE_PATH:-}
      AI_ORCHESTRATOR_PLAYWRIGHT_VIDEO_SIZE: ${AI_ORCHESTRATOR_PLAYWRIGHT_VIDEO_SIZE:-1280x720}
      AI_ORCHESTRATOR_PLAYWRIGHT_SAVE_TRACE: ${AI_ORCHESTRATOR_PLAYWRIGHT_SAVE_TRACE:-true}
      AI_ORCHESTRATOR_EXPLORATION_MAX_STEPS: ${AI_ORCHESTRATOR_EXPLORATION_MAX_STEPS:-24}
      AI_ORCHESTRATOR_EXPLORATION_TIMEOUT_MS: ${AI_ORCHESTRATOR_EXPLORATION_TIMEOUT_MS:-180000}
      AI_ORCHESTRATOR_SCRIPTED_UPLOAD_PATH: ${AI_ORCHESTRATOR_SCRIPTED_UPLOAD_PATH:-/tmp/aiwtp-ai-orchestrator/shared/avatar-smoke.txt}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
    ports:
      - "${AI_ORCHESTRATOR_HOST_PORT:-18081}:${AI_ORCHESTRATOR_PORT:-8081}"
    command: ["node", "./scripts/start_ai_orchestrator_server.mjs"]
    volumes:
      - ai-orchestrator-output:/tmp/aiwtp-ai-orchestrator
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.AI_ORCHESTRATOR_PORT || '8081') + '/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  console:
    build:
      context: .
      target: app-runtime
    depends_on:
      control-plane:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
    environment:
      PORT: 8082
      CONSOLE_BIND_HOST: 0.0.0.0
      CONSOLE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
      # External control-plane API base for artifact/download links. Console UI itself is on :18082.
      CONTROL_PLANE_PUBLIC_BASE_URL: http://127.0.0.1:18080
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
      AI_ORCHESTRATOR_BASE_URL: http://ai-orchestrator:${AI_ORCHESTRATOR_PORT:-8081}
      CONSOLE_DEFAULT_SUBJECT_ID: console-user
    ports:
      - "18082:8082"
    command: ["node", "./scripts/start_console_server.mjs"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8082/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  tools:
    build:
      context: .
      target: playwright-runtime
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
      AI_ORCHESTRATOR_BASE_URL: http://ai-orchestrator:${AI_ORCHESTRATOR_PORT:-8081}
      CONSOLE_BASE_URL: http://console:8082
      AI_ORCHESTRATOR_STORE_MODE: ${AI_ORCHESTRATOR_STORE_MODE:-postgres}
      AI_ORCHESTRATOR_DATABASE_URL: ${AI_ORCHESTRATOR_DATABASE_URL:-postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp}
      AI_ORCHESTRATOR_RUN_MIGRATIONS: ${AI_ORCHESTRATOR_RUN_MIGRATIONS:-true}
      AI_ORCHESTRATOR_SCRIPTED_UPLOAD_PATH: ${AI_ORCHESTRATOR_SCRIPTED_UPLOAD_PATH:-/tmp/aiwtp-ai-orchestrator/shared/avatar-smoke.txt}
      ARTIFACT_STORAGE_MODE: s3
      ARTIFACT_S3_ENDPOINT: http://minio:9000
      ARTIFACT_S3_REGION: us-east-1
      ARTIFACT_S3_BUCKET: aiwtp-artifacts
      ARTIFACT_S3_ACCESS_KEY_ID: minioadmin
      ARTIFACT_S3_SECRET_ACCESS_KEY: minioadmin
      ARTIFACT_S3_FORCE_PATH_STYLE: "true"
      ARTIFACT_S3_PREFIX: artifacts
      ARTIFACT_RETENTION_DAYS_DEFAULT: "7"
      ARTIFACT_DOWNLOAD_SIGNED_URL_TTL_SECONDS: "300"
    shm_size: 1gb
    command: ["sleep", "infinity"]
    volumes:
      - ai-orchestrator-output:/tmp/aiwtp-ai-orchestrator

volumes:
  postgres-data:
  minio-data:
  ai-orchestrator-output:
