services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: aiwtp
      POSTGRES_PASSWORD: aiwtp-password
      POSTGRES_DB: aiwtp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      CONTROL_PLANE_BIND_HOST: 0.0.0.0
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_RUN_MIGRATIONS: "false"
    ports:
      - "18080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  tools:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
    shm_size: 1gb
    command: ["sleep", "infinity"]

volumes:
  postgres-data:
