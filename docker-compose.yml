services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: aiwtp
      POSTGRES_PASSWORD: aiwtp-password
      POSTGRES_DB: aiwtp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  control-plane:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 8080
      CONTROL_PLANE_BIND_HOST: 0.0.0.0
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_RUN_MIGRATIONS: "false"
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
      ARTIFACT_STORAGE_MODE: s3
      ARTIFACT_S3_ENDPOINT: http://minio:9000
      ARTIFACT_S3_PUBLIC_ENDPOINT: http://127.0.0.1:19000
      ARTIFACT_S3_REGION: us-east-1
      ARTIFACT_S3_BUCKET: aiwtp-artifacts
      ARTIFACT_S3_ACCESS_KEY_ID: minioadmin
      ARTIFACT_S3_SECRET_ACCESS_KEY: minioadmin
      ARTIFACT_S3_FORCE_PATH_STYLE: "true"
      ARTIFACT_S3_PREFIX: artifacts
      ARTIFACT_RETENTION_DAYS_DEFAULT: "7"
      ARTIFACT_DOWNLOAD_SIGNED_URL_TTL_SECONDS: "300"
    ports:
      - "18080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  ai-orchestrator:
    build: .
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      PORT: ${AI_ORCHESTRATOR_PORT:-8081}
      AI_ORCHESTRATOR_PORT: ${AI_ORCHESTRATOR_PORT:-8081}
      AI_ORCHESTRATOR_BIND_HOST: ${AI_ORCHESTRATOR_BIND_HOST:-0.0.0.0}
      AI_PROVIDER: ${AI_PROVIDER:-google}
      AI_GOOGLE_MODEL: ${AI_GOOGLE_MODEL:-gemini-2.5-flash}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL:-gpt-4.1-mini}
      AI_OPENAI_BASE_URL: ${AI_OPENAI_BASE_URL:-}
      AI_PROVIDER_TEMPERATURE: ${AI_PROVIDER_TEMPERATURE:-0.1}
      AI_MEMORY_MAX_FACTS: ${AI_MEMORY_MAX_FACTS:-32}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
    ports:
      - "${AI_ORCHESTRATOR_HOST_PORT:-18081}:${AI_ORCHESTRATOR_PORT:-8081}"
    command: ["node", "./scripts/start_ai_orchestrator_server.mjs"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.AI_ORCHESTRATOR_PORT || '8081') + '/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  tools:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      CONTROL_PLANE_STORE_MODE: postgres
      CONTROL_PLANE_DATABASE_URL: postgresql://aiwtp:aiwtp-password@postgres:5432/aiwtp
      CONTROL_PLANE_BASE_URL: http://control-plane:8080
      CONTROL_PLANE_JWT_SECRET: local-control-plane-dev-secret
      AI_ORCHESTRATOR_BASE_URL: http://ai-orchestrator:${AI_ORCHESTRATOR_PORT:-8081}
      ARTIFACT_STORAGE_MODE: s3
      ARTIFACT_S3_ENDPOINT: http://minio:9000
      ARTIFACT_S3_REGION: us-east-1
      ARTIFACT_S3_BUCKET: aiwtp-artifacts
      ARTIFACT_S3_ACCESS_KEY_ID: minioadmin
      ARTIFACT_S3_SECRET_ACCESS_KEY: minioadmin
      ARTIFACT_S3_FORCE_PATH_STYLE: "true"
      ARTIFACT_S3_PREFIX: artifacts
      ARTIFACT_RETENTION_DAYS_DEFAULT: "7"
      ARTIFACT_DOWNLOAD_SIGNED_URL_TTL_SECONDS: "300"
    shm_size: 1gb
    command: ["sleep", "infinity"]

volumes:
  postgres-data:
  minio-data:
