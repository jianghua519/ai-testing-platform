openapi: 3.1.0
info:
  title: AI Web Testing Platform API (V2)
  version: 1.0.0
  description: >
    Normative contract for V2. Any implementation must remain compatible within
    major version 1.x.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Runs
  - name: RunItems
  - name: TestAssets
  - name: Reports
  - name: IAM
  - name: Agents
  - name: Internal
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
  /api/v1/me:
    get:
      tags: [IAM]
      summary: Get current principal
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/test-cases:
    post:
      tags: [TestAssets]
      summary: Create a versioned test case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCaseCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseBundle"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [TestAssets]
      summary: List test cases
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: project_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/test-cases/{test_case_id}:
    get:
      tags: [TestAssets]
      summary: Get a test case
      parameters:
        - in: path
          name: test_case_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [TestAssets]
      summary: Update mutable test case metadata
      parameters:
        - in: path
          name: test_case_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCaseUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [TestAssets]
      summary: Archive a test case
      parameters:
        - in: path
          name: test_case_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCase"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/test-cases/{test_case_id}/versions:
    get:
      tags: [TestAssets]
      summary: List versions for a test case
      parameters:
        - in: path
          name: test_case_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseVersionListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [TestAssets]
      summary: Create a new immutable version for a test case
      parameters:
        - in: path
          name: test_case_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCaseVersionCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseBundle"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/test-case-versions/{test_case_version_id}:
    get:
      tags: [TestAssets]
      summary: Get a test case version
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseVersion"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/test-case-versions/{test_case_version_id}:publish:
    post:
      tags: [TestAssets]
      summary: Publish a draft test case version
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseVersion"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/test-case-versions/{test_case_version_id}/data-template:
    get:
      tags: [TestAssets]
      summary: Get the data template snapshot bound to a case version
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataTemplateVersion"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/test-case-versions/{test_case_version_id}/dataset-rows:
    get:
      tags: [TestAssets]
      summary: List dataset rows bound to a case version template
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetRowListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [TestAssets]
      summary: Create a dataset row for a case version template
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetRowCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetRow"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/test-case-versions/{test_case_version_id}:bind-default-dataset:
    post:
      tags: [TestAssets]
      summary: Bind the default dataset row for a case version
      parameters:
        - in: path
          name: test_case_version_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindDefaultDatasetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCaseVersion"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/dataset-rows/{dataset_row_id}:
    patch:
      tags: [TestAssets]
      summary: Update a dataset row
      parameters:
        - in: path
          name: dataset_row_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetRowUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetRow"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      tags: [TestAssets]
      summary: Archive a dataset row
      parameters:
        - in: path
          name: dataset_row_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetRow"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/runs:
    post:
      tags: [Runs]
      summary: Create a run
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCreateRequest"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }
    get:
      tags: [Runs]
      summary: List runs
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ProjectId"
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/runs/{run_id}:
    get:
      tags: [Runs]
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/runs/{run_id}:cancel:
    post:
      tags: [Runs]
      summary: Cancel a run
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          description: Accepted
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/run-items:
    get:
      tags: [RunItems]
      summary: List run items
      parameters:
        - $ref: "#/components/parameters/RunIdQuery"
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunItemListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/run-items/{run_item_id}:
    get:
      tags: [RunItems]
      summary: Get a run item
      parameters:
        - in: path
          name: run_item_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunItem"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/agent/jobs/{job_id}/steps/{source_step_id}:decide:
    post:
      tags: [Agents]
      summary: Resolve remote control decision for the next step
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: path
          name: source_step_id
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerStepControlRequest"
      responses:
        "200":
          description: Control decision returned
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerStepControlDecision"
        "204":
          description: No control override, execute original step
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/runner-results:
    post:
      tags: [Internal]
      summary: Accept runner result envelopes over HTTP bridge
      description: Idempotent by `event_id`. Duplicate events return HTTP 200 with `duplicate=true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunnerResultEnvelopeBridge"
      responses:
        "202":
          description: Accepted
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerResultAccepted"
        "200":
          description: Duplicate event accepted idempotently
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerResultAccepted"
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/internal/jobs/{job_id}/steps/{source_step_id}:override:
    post:
      tags: [Internal]
      summary: Queue a remote control override for a future step execution
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: path
          name: source_step_id
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerStepControlDecision"
      responses:
        "202":
          description: Accepted
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: boolean, const: true }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/internal/jobs/{job_id}/events:
    get:
      tags: [Internal]
      summary: List ingested runner events for a job
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEventListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/run-items/{run_item_id}/step-events:
    get:
      tags: [Internal]
      summary: List projected step execution events for a run item
      parameters:
        - in: path
          name: run_item_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalStepEventListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/run-items/{run_item_id}/artifacts:
    get:
      tags: [Internal]
      summary: List projected artifacts for a run item
      parameters:
        - in: path
          name: run_item_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalArtifactListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/runs/{run_id}/step-events:
    get:
      tags: [Internal]
      summary: List projected step execution events for a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalStepEventListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/runs/{run_id}/artifacts:
    get:
      tags: [Internal]
      summary: List projected artifacts for a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalArtifactListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/artifacts/{artifact_id}/download:
    get:
      tags: [Internal]
      summary: Download an artifact from object storage or local fallback
      parameters:
        - in: path
          name: artifact_id
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: mode
          schema:
            type: string
            enum: [redirect, stream]
            default: redirect
      responses:
        "302":
          description: Redirect to signed object storage URL
        "200":
          description: Stream download
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/runs/{run_id}:pause:
    post:
      tags: [Internal]
      summary: Request pause for a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/runs/{run_id}:resume:
    post:
      tags: [Internal]
      summary: Resume a paused run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/migrations:
    get:
      tags: [Internal]
      summary: List applied control-plane schema migrations
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalMigrationListResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/internal/runs:enqueue-web:
    post:
      tags: [Internal]
      summary: Enqueue a single web job as a new run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalEnqueueWebRunRequest"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalQueuedWebRunResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/internal/agents:register:
    post:
      tags: [Internal]
      summary: Register or upsert a worker agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalAgentRegistrationRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAgent"
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/internal/agents/{agent_id}:heartbeat:
    post:
      tags: [Internal]
      summary: Update agent heartbeat and status
      parameters:
        - in: path
          name: agent_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalAgentHeartbeatRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAgent"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/agents/{agent_id}:acquire-lease:
    post:
      tags: [Internal]
      summary: Acquire the next schedulable job lease for an agent
      parameters:
        - in: path
          name: agent_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalAcquireLeaseRequest"
      responses:
        "200":
          description: Lease acquired
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAcquiredLeaseResponse"
        "204":
          description: No schedulable job available
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/leases/{lease_token}:heartbeat:
    post:
      tags: [Internal]
      summary: Extend a currently held job lease
      parameters:
        - in: path
          name: lease_token
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalLeaseHeartbeatRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalJobLease"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/internal/leases/{lease_token}:complete:
    post:
      tags: [Internal]
      summary: Mark a held job lease as completed, failed, or canceled
      parameters:
        - in: path
          name: lease_token
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalLeaseCompletionRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalJobLease"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/report-jobs:
    post:
      tags: [Reports]
      summary: Create a report job
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportJobCreateRequest"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /api/v1/report-jobs/{report_job_id}:
    get:
      tags: [Reports]
      summary: Get report job status
      parameters:
        - in: path
          name: report_job_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: OK
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            X-Trace-Id: { $ref: "#/components/headers/XTraceId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJob"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/report-jobs/{report_job_id}/download:
    get:
      tags: [Reports]
      summary: Download a report artifact (signed URL or stream)
      parameters:
        - in: path
          name: report_job_id
          required: true
          schema: { $ref: "#/components/schemas/UUID" }
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [json, junit, csv, pdf, xlsx]
      responses:
        "302":
          description: Redirect to signed URL
        "200":
          description: Stream download
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    XRequestId:
      schema: { type: string }
      description: Request identifier echoed by server.
    XTraceId:
      schema: { type: string }
      description: Trace identifier for log/trace correlation.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Unauthorized (RBAC/tenant boundary)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Conflict (invalid state transition)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    TooManyRequests:
      description: Rate limit or quota exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  parameters:
    TenantId:
      in: header
      name: X-Tenant-Id
      required: true
      schema: { $ref: "#/components/schemas/UUID" }
      description: >
        Tenant scope header. Must match token claims. Prefer using token claims
        as source of truth; this header is for explicit scoping.
    ProjectId:
      in: header
      name: X-Project-Id
      required: true
      schema: { $ref: "#/components/schemas/UUID" }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string, minLength: 8, maxLength: 128 }
    RunId:
      in: path
      name: run_id
      required: true
      schema: { $ref: "#/components/schemas/UUID" }
    RunIdQuery:
      in: query
      name: run_id
      required: true
      schema: { $ref: "#/components/schemas/UUID" }
  schemas:
    UUID:
      type: string
      format: uuid
    ISO8601:
      type: string
      format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id]
          properties:
            code: { type: string, minLength: 1 }
            message: { type: string, minLength: 1 }
            trace_id: { type: string, minLength: 1 }
            details:
              type: object
              additionalProperties: true
    Principal:
      type: object
      required: [subject_id, tenant_id]
      properties:
        subject_id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_ids:
          type: array
          items: { $ref: "#/components/schemas/UUID" }
        roles:
          type: array
          items: { type: string }
    RunCreateRequest:
      type: object
      required: [tenant_id, project_id, name, mode, selection]
      properties:
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        name: { type: string, minLength: 1, maxLength: 200 }
        mode:
          type: string
          enum: [standard, intelligent]
        selection:
          $ref: "#/components/schemas/RunSelection"
        execution_policy:
          $ref: "#/components/schemas/RunExecutionPolicy"
    RunSelection:
      oneOf:
        - $ref: "#/components/schemas/InlineWebPlanSelection"
        - $ref: "#/components/schemas/CaseVersionSelection"
    InlineWebPlanSelection:
      type: object
      required: [kind, plan, env_profile]
      properties:
        kind:
          type: string
          enum: [inline_web_plan]
        plan:
          type: object
          description: Source web plan draft passed through to enqueue.
          additionalProperties: true
        env_profile:
          type: object
          description: Env profile passed through to enqueue.
          additionalProperties: true
    CaseVersionSelection:
      type: object
      required: [kind, test_case_version_id]
      properties:
        kind:
          type: string
          enum: [case_version]
        test_case_version_id:
          $ref: "#/components/schemas/UUID"
        dataset_row_id:
          $ref: "#/components/schemas/UUID"
    RunExecutionPolicy:
      type: object
      properties:
        required_capabilities:
          type: array
          items: { type: string, minLength: 1 }
        variable_context:
          type: object
          additionalProperties: true
        trace_id: { type: string }
        correlation_id: { type: string }
      additionalProperties: true
    DatasetPayload:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        values:
          type: object
          additionalProperties: true
    TestCaseCreateRequest:
      type: object
      required: [tenant_id, project_id, name, plan, env_profile]
      properties:
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        name: { type: string, minLength: 1, maxLength: 200 }
        plan:
          type: object
          additionalProperties: true
        env_profile:
          type: object
          additionalProperties: true
        version_label: { type: string }
        change_summary: { type: string }
        publish: { type: boolean }
        default_dataset:
          $ref: "#/components/schemas/DatasetPayload"
    TestCaseUpdateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        status:
          type: string
          enum: [draft, active, archived]
    TestCaseVersionCreateRequest:
      type: object
      required: [plan, env_profile]
      properties:
        plan:
          type: object
          additionalProperties: true
        env_profile:
          type: object
          additionalProperties: true
        version_label: { type: string }
        change_summary: { type: string }
        publish: { type: boolean }
        default_dataset:
          $ref: "#/components/schemas/DatasetPayload"
    DataTemplateField:
      type: object
      required: [key, source_type, value_type, required]
      properties:
        key: { type: string, minLength: 1 }
        source_type:
          type: string
          enum: [variable_ref, file_ref, loop_source_ref]
        value_type:
          type: string
          enum: [string, number, boolean, object, array, file, unknown]
        required: { type: boolean }
    DataTemplateSchema:
      type: object
      required: [fields]
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/DataTemplateField"
    TestCase:
      type: object
      required: [id, tenant_id, project_id, data_template_id, name, status, created_at, updated_at]
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        data_template_id: { $ref: "#/components/schemas/UUID" }
        name: { type: string }
        status:
          type: string
          enum: [draft, active, archived]
        latest_version_id: { $ref: "#/components/schemas/UUID" }
        latest_published_version_id: { $ref: "#/components/schemas/UUID" }
        created_by: { $ref: "#/components/schemas/UUID" }
        updated_by: { $ref: "#/components/schemas/UUID" }
        created_at: { $ref: "#/components/schemas/ISO8601" }
        updated_at: { $ref: "#/components/schemas/ISO8601" }
    TestCaseListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TestCase"
        next_cursor: { type: string }
    TestCaseVersion:
      type: object
      required:
        [id, test_case_id, tenant_id, project_id, version_no, status, plan, env_profile, data_template_id, data_template_version_id, created_at]
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        test_case_id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        version_no: { type: integer, minimum: 1 }
        version_label: { type: string }
        status:
          type: string
          enum: [draft, published, archived]
        plan:
          type: object
          additionalProperties: true
        env_profile:
          type: object
          additionalProperties: true
        data_template_id: { $ref: "#/components/schemas/UUID" }
        data_template_version_id: { $ref: "#/components/schemas/UUID" }
        default_dataset_row_id: { $ref: "#/components/schemas/UUID" }
        source_recording_id: { $ref: "#/components/schemas/UUID" }
        source_run_id: { $ref: "#/components/schemas/UUID" }
        derived_from_case_version_id: { $ref: "#/components/schemas/UUID" }
        change_summary: { type: string }
        created_by: { $ref: "#/components/schemas/UUID" }
        created_at: { $ref: "#/components/schemas/ISO8601" }
    TestCaseVersionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TestCaseVersion"
        next_cursor: { type: string }
    DataTemplateVersion:
      type: object
      required:
        [data_template_id, data_template_version_id, test_case_id, tenant_id, project_id, version_no, schema, validation_rules, created_at]
      properties:
        data_template_id: { $ref: "#/components/schemas/UUID" }
        data_template_version_id: { $ref: "#/components/schemas/UUID" }
        test_case_id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        version_no: { type: integer, minimum: 1 }
        schema:
          $ref: "#/components/schemas/DataTemplateSchema"
        validation_rules:
          type: object
          additionalProperties: true
        default_dataset_row_id: { $ref: "#/components/schemas/UUID" }
        created_by: { $ref: "#/components/schemas/UUID" }
        created_at: { $ref: "#/components/schemas/ISO8601" }
    DatasetRowCreateRequest:
      type: object
      required: [values]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        values:
          type: object
          additionalProperties: true
    DatasetRowUpdateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        values:
          type: object
          additionalProperties: true
    DatasetRow:
      type: object
      required: [id, test_case_id, data_template_version_id, tenant_id, project_id, name, status, values, created_at, updated_at]
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        test_case_id: { $ref: "#/components/schemas/UUID" }
        data_template_version_id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        name: { type: string }
        status:
          type: string
          enum: [active, archived]
        values:
          type: object
          additionalProperties: true
        created_by: { $ref: "#/components/schemas/UUID" }
        updated_by: { $ref: "#/components/schemas/UUID" }
        created_at: { $ref: "#/components/schemas/ISO8601" }
        updated_at: { $ref: "#/components/schemas/ISO8601" }
    DatasetRowListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetRow"
        next_cursor: { type: string }
    BindDefaultDatasetRequest:
      type: object
      required: [dataset_row_id]
      properties:
        dataset_row_id: { $ref: "#/components/schemas/UUID" }
    TestCaseBundle:
      type: object
      required: [test_case, version, data_template, default_dataset_row]
      properties:
        test_case:
          $ref: "#/components/schemas/TestCase"
        version:
          $ref: "#/components/schemas/TestCaseVersion"
        data_template:
          $ref: "#/components/schemas/DataTemplateVersion"
        default_dataset_row:
          $ref: "#/components/schemas/DatasetRow"
    Run:
      type: object
      required: [id, tenant_id, project_id, status, created_at]
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        name: { type: string }
        status:
          type: string
          enum: [created, queued, running, succeeded, failed, canceling, canceled, archived]
        created_at: { $ref: "#/components/schemas/ISO8601" }
        updated_at: { $ref: "#/components/schemas/ISO8601" }
        summary:
          type: object
          additionalProperties: true
    RunListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Run" }
        next_cursor: { type: string }
    RunItem:
      type: object
      required: [id, run_id, tenant_id, project_id, status]
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        run_id: { $ref: "#/components/schemas/UUID" }
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        status:
          type: string
          enum: [pending, dispatched, running, passed, failed, canceled]
        attempt_no: { type: integer, minimum: 0 }
        error:
          type: object
          additionalProperties: true
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactReference"
        summary:
          type: object
          additionalProperties: true
    RunItemListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RunItem" }
        next_cursor: { type: string }
    ReportJobCreateRequest:
      type: object
      required: [tenant_id, project_id, run_ids, formats]
      properties:
        tenant_id: { $ref: "#/components/schemas/UUID" }
        project_id: { $ref: "#/components/schemas/UUID" }
        run_ids:
          type: array
          minItems: 1
          maxItems: 30
          items: { $ref: "#/components/schemas/UUID" }
        formats:
          type: array
          minItems: 1
          items:
            type: string
            enum: [json, junit, csv, pdf, xlsx]
        options:
          type: object
          additionalProperties: true
    ReportJob:
      type: object
