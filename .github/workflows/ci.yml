name: ci

on:
  push:
  pull_request:

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install --no-cache-dir pyyaml
      - name: Validate repo documents and contracts
        run: make validate
